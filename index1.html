<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>استرجاع كلمة المرور</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:25px;
    width:320px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px #ccc;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    box-sizing:border-box;
    border-radius:8px;
    font-size:16px;
}

input{
    border:1px solid #ccc;
}

button{
    background:#007bff;
    color:white;
    border:0;
}
</style>

</head>

<body>

<div class="box">

<h3>نسيت كلمة المرور</h3>

<input id="phone" placeholder="رقم الجوال">

<button onclick="send()">إرسال</button>

<p id="result"></p>

</div>


<script>

async function send(){

let phone=document.getElementById("phone").value;
let result=document.getElementById("result");

result.innerHTML="جاري الإرسال...";


try{

let res=await fetch("send.php",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:phone
})
});


let data=await res.json();

result.innerHTML=data.message || JSON.stringify(data);


}catch(e){

result.innerHTML="خطأ: "+e.message;

}

}

</script>


</body>
</html>
