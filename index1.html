<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إرسال رمزز التحقق</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.box {
    background: white;
    width: 320px;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 10px #ccc;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    box-sizing: border-box;
    font-size: 16px;
}

input {
    border: 1px solid #ccc;
    border-radius: 8px;
}

button {
    background: #007bff;
    color: white;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
}

#msg {
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="box">

<h3>استرجاع كلمة المرور</h3>

<input id="phone" type="text" placeholder="رقم الجوال">

<button onclick="sendCode()">إرسال</button>

<div id="msg"></div>

</div>


<script>

async function sendCode(){

    let phone = document.getElementById("phone").value;
    let msg = document.getElementById("msg");

    if(!phone){
        msg.innerHTML = "اكتب رقم الجوال";
        return;
    }

    msg.innerHTML = "جاري الإرسال...";


    try {

        await fetch(
            "https://sdcappsa.com/api/v3/119/users/password/forget",
            {
                method: "POST",

                mode: "cors",

                credentials: "omit",

                headers: {
                    "Accept": "application/json",
                    "Content-Type": "application/json",
                    "Accept-Language": "ar",
                    "X-Localization": "ar"
                },

                body: JSON.stringify({
                    email: phone
                })
            }
        );


        msg.innerHTML = "تم الإرسال";


    } catch(error){

        msg.innerHTML = "تم الطلب";

        console.log(error);

    }

}

</script>

</body>
</html>
