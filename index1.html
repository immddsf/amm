<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اختبار إرسال OTP</title>
</head>
<body>

<button onclick="sendOTP()">إرسال OTP</button>

<pre id="result"></pre>

<script>
async function sendOTP() {
  const response = await fetch("https://denden.my.taker.io/api/v3/auth/authorize", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Accept": "application/json"
    },
    body: JSON.stringify({
      phone_number: "+966557739345"
    })
  });

  const data = await response.json();
  document.getElementById("result").textContent =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
