<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة إرسال JSON</title>
</head>
<body>

    <h3>إرسال رقم الهاتف</h3>

    <!-- حقل الإدخال والزر -->
    <input type="tel" id="userPhone" placeholder="+966500000000">
    <button onclick="sendData()">إرسال</button>

    <p id="result"></p>

    <script>
        function sendData() {
            // 1. قراءة الرقم من الحقل
            const phoneInput = document.getElementById('userPhone').value;

            // 2. تجهيز البيانات كـ Object
            const dataObject = {
                phone_number: phoneInput
            };

            // 3. تحديد رابط الخادم الخاص بك (استبدله برابطك المحلي أو الخاص بموقعك)
            const myServerUrl = 'https://denden.my.taker.io/api/v3/auth/authorize'; // رابط تجريبي يعيد لك ما أرسلته

            // 4. إرسال البيانات بصيغة JSON
            fetch(myServerUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' // تخبر السيرفر أن البيانات نوعها JSON
                },
                body: JSON.stringify(dataObject) // تحويل الـ Object إلى نص JSON
            })
            .then(response => response.json())
            .then(result => {
                console.log('استجابة السيرفر:', result);
                document.getElementById('result').innerText = 'تم الإرسال بنجاح!';
            })
            .catch(error => {
                console.error('خطأ:', error);
                document.getElementById('result').innerText = 'حدث خطأ في الإرسال.';
            });
        }
    </script>

</body>
</html>
