<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>استرجاع كلمة المرور</title>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 300px;
    box-shadow: 0 0 10px #ccc;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
}

button {
    background: #007bff;
    color: white;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
}

#result {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="box">
    <h3>نسيت كلمة المرور</h3>

    <input id="phone" type="text" placeholder="رقم الجوال">

    <button onclick="sendRequest()">إرسال</button>

    <div id="result"></div>
</div>


<script>
async function sendRequest() {

    let phone = document.getElementById("phone").value;

    let result = document.getElementById("result");
    result.innerHTML = "جاري الإرسال...";


    let response = await fetch(
        "https://sdcappsa.com/api/v3/119/users/password/forget",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json",
                "X-Localization": "ar",

                // ضع القيم الصحيحة هنا
                "Timestamp": "1784640512",
                "Nonce": "9c9b337879bfb67ca2b4886714335576",
                "Signature": "fe8a4c9e740d63b49008b0ce2198da631e635746bec78259379023e70526060d"
            },

            body: JSON.stringify({
                email: phone
            })
        }
    );


    let data = await response.text();

    result.innerHTML = data;
}
</script>

</body>
</html>
