<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>استرجاع كلمة المرور</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f3f3f3;
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    background: white;
    width: 330px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 15px #ccc;
    text-align: center;
}

h2 {
    font-size: 20px;
}

input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
    text-align: center;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: #007bff;
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:disabled {
    background: #888;
}

#result {
    margin-top: 20px;
    font-size: 15px;
    color: #333;
}
</style>

</head>

<body>

<div class="container">

<h2>نسيت كلمة المرور</h2>

<input 
    id="phone" 
    type="text" 
    placeholder="رقم الجوال"
>

<button id="sendBtn" onclick="sendRequest()">
    إرسال
</button>

<div id="result"></div>

</div>


<script>

async function sendRequest() {

    const phone = document.getElementById("phone").value;
    const result = document.getElementById("result");
    const btn = document.getElementById("sendBtn");


    if (!phone) {
        result.innerHTML = "اكتب رقم الجوال";
        return;
    }


    btn.disabled = true;
    result.innerHTML = "جاري الإرسال...";


    try {

        const response = await fetch(
            "https://sdcappsa.com/api/v3/119/users/password/forget",
            {
                method: "POST",

                mode: "cors",

                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json",
                    "X-Localization": "ar",

                    "Timestamp": "1784640512",
                    "Nonce": "9c9b337879bfb67ca2b4886714335576",
                    "Signature": "fe8a4c9e740d63b49008b0ce2198da631e635746bec78259379023e70526060d"
                },

                body: JSON.stringify({
                    email: phone
                })
            }
        );


        const data = await response.json();


        if (data.message) {
            result.innerHTML = data.message;
        } else {
            result.innerHTML = JSON.stringify(data);
        }


    } catch (error) {

        result.innerHTML =
            "حدث خطأ:<br>" + error.message;

        console.log(error);

    } finally {

        btn.disabled = false;

    }

}

</script>

</body>
</html>
