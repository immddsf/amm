<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إرسال رمز</title>
</head>

<body>

<input id="phone" placeholder="رقم الجوال">

<button onclick="sendOtp()">إرسال</button>

<script>

function sendOtp(){

let phone = document.getElementById("phone").value;

fetch("https://sdcappsa.com/api/v3/119/users/password/forget", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "Accept": "application/json",
        "Accept-Language": "ar"
    },
    body: JSON.stringify({
        email: phone
    })
});

alert("تم طلب الإرسال");

}

</script>

</body>
</html>
