<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار إرسال OTP</title>

<style>
body{
    margin:0;
    font-family:Tahoma,Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:360px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#005ec2;
}

#result{
    margin-top:20px;
    background:#f1f1f1;
    padding:10px;
    border-radius:8px;
    text-align:left;
    white-space:pre-wrap;
    word-break:break-word;
}
</style>
</head>

<body>

<div class="box">

<h2>إرسال رمز التحقق</h2>

<input
id="phone"
type="text"
placeholder="+9665XXXXXXXX">

<button onclick="sendOTP()">
إرسال
</button>

<div id="result"></div>

</div>

<script>

async function sendOTP(){

const phone=document.getElementById("phone").value;

document.getElementById("result").innerHTML="جاري الإرسال...";

try{

const response=await fetch("https://denden.my.taker.io/api/v3/auth/authorize",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Accept":"application/json"
},

body:JSON.stringify({
phone_number:phone
})

});

const data=await response.json();

document.getElementById("result").innerHTML=
"<pre>"+JSON.stringify(data,null,2)+"</pre>";

}catch(e){

document.getElementById("result").innerHTML=
"خطأ:<br>"+e;

}

}

</script>

</body>
</html>
