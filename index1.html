<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>استرجاع كلمة المرور</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    width: 320px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 10px #ccc;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    box-sizing: border-box;
    font-size: 16px;
    border-radius: 8px;
}

input {
    border: 1px solid #ccc;
}

button {
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

#result {
    margin-top: 15px;
    word-break: break-word;
}
</style>

</head>

<body>

<div class="box">

<h3>نسيت كلمة المرور</h3>

<input id="phone" type="text" placeholder="رقم الجوال">

<button onclick="send()">إرسال</button>

<div id="result"></div>

</div>


<script>

function send(){

    let phone = document.getElementById("phone").value;
    let result = document.getElementById("result");

    if(!phone){
        result.innerHTML = "اكتب رقم الجوال";
        return;
    }

    result.innerHTML = "جاري الإرسال...";


    fetch("send.php", {
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"email=" + encodeURIComponent(phone)
    })

    .then(response => response.json())

    .then(data => {

        result.innerHTML = JSON.stringify(data);

    })

    .catch(error => {

        result.innerHTML = "خطأ: " + error.message;

    });

}

</script>


</body>
</html>
