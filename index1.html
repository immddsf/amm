<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>استرجاع كلمة المرور</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    width: 320px;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 15px #ccc;
    text-align: center;
}

h3 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    direction: ltr;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

#result {
    margin-top: 15px;
    font-size: 14px;
    word-break: break-word;
}
</style>

</head>

<body>

<div class="box">

<h3>نسيت كلمة المرور</h3>

<input 
    id="phone" 
    type="text" 
    placeholder="أدخل رقم الجوال"
>

<button onclick="sendRequest()">
    إرسال
</button>

<div id="result"></div>

</div>


<script>

async function sendRequest() {

    let phone = document.getElementById("phone").value;
    let result = document.getElementById("result");

    if (!phone) {
        result.innerHTML = "اكتب رقم الجوال أولاً";
        return;
    }

    result.innerHTML = "جاري الإرسال...";


    try {

        let response = await fetch(
            "https://sdcappsa.com/api/v3/119/users/password/forget",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json",
                    "X-Localization": "ar",

                    "Timestamp": "1784640512",
                    "Nonce": "9c9b337879bfb67ca2b4886714335576",
                    "Signature": "fe8a4c9e740d63b49008b0ce2198da631e635746bec78259379023e70526060d"
                },

                body: JSON.stringify({
                    email: phone
                })
            }
        );


        let data = await response.text();


        result.innerHTML =
            "<b>رمز الحالة:</b> " + response.status +
            "<br><br>" +
            "<b>الرد:</b><br>" +
            data;


    } catch (error) {

        result.innerHTML =
            "<b>حدث خطأ:</b><br>" +
            error.message;

        console.log(error);
    }

}

</script>


</body>
</html>
