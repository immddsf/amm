<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM Reference - الصفحة الرئيسية</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-section">
                <span class="logo-icon">📖</span>
                <h1>AMM Reference</h1>
            </div>
        </div>

        <div class="search-section">
            <input type="text" class="search-input" placeholder="ابحث في جميع المراجع...">
        </div>

        <div class="quick-reference-section">
            <h2 class="section-title">المراجع السريعة</h2>
            
            <div class="reference-cards">
                <div class="reference-card">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">321</div>
                        <div class="card-subtitle">3 مراجع</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>

                <div class="reference-card">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">330</div>
                        <div class="card-subtitle">3 مراجع</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>

                <div class="reference-card">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">777</div>
                        <div class="card-subtitle">2 مراجع</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>

                <div class="reference-card">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">787</div>
                        <div class="card-subtitle">4 مراجع</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>
            </div>
        </div>

        <button class="admin-button">
            <span class="lock-icon">🔒</span>
            لوحة التحكم
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
