<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMM Reference</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-section">
                <span class="logo-icon">📖</span>
                <h1>AMM Reference</h1>
            </div>
        </div>

        <div class="search-section">
            <input type="text" class="search-input" placeholder="Search all references...">
        </div>

        <div class="quick-reference-section">
            <h2 class="section-title">Quick References</h2>
            
            <div class="reference-cards">
                <div class="reference-card" onclick="openReference('321')">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">321</div>
                        <div class="card-subtitle">View References</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>

                <div class="reference-card" onclick="openReference('330')">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">330</div>
                        <div class="card-subtitle">View References</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>

                <div class="reference-card" onclick="openReference('777')">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">777</div>
                        <div class="card-subtitle">View References</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>

                <div class="reference-card" onclick="openReference('787')">
                    <div class="card-icon">📄</div>
                    <div class="card-content">
                        <div class="card-number">787</div>
                        <div class="card-subtitle">View References</div>
                    </div>
                    <div class="card-arrow">›</div>
                </div>
            </div>
        </div>

        <button class="admin-button" onclick="openAdminPanel()">
            <span class="lock-icon">🔒</span>
            Admin Panel
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
