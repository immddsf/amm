<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المرجع</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="details.css">
</head>
<body>
    <div class="details-container">
        <!-- رأس الصفحة -->
        <div class="details-header">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="reference-number" id="referenceNumber">787</div>
            <button class="add-btn" onclick="openAddModal()">+</button>
        </div>

        <!-- منطقة المحتوى -->
        <div class="details-content">
            <div id="referencesList" class="references-list">
                <div class="empty-state">
                    <div class="empty-icon">📁</div>
                    <p class="empty-title">لا توجد مراجع حتى الآن</p>
                    <p class="empty-subtitle">اضغط + لإضافة أول مرجع</p>
                    <button class="add-reference-btn" onclick="openAddModal()">+ إضافة مرجع</button>
                </div>
            </div>
        </div>

        <!-- نموذج إضافة مرجع جديد -->
        <div id="addModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>إضافة مرجع جديد</h2>
                    <button class="close-btn" onclick="closeAddModal()">&times;</button>
                </div>

                <form id="addReferenceForm" class="form">
                    <div class="form-group">
                        <label for="refName">الاسم:</label>
                        <input type="text" id="refName" placeholder="أدخل الاسم" required>
                    </div>

                    <div class="form-group">
                        <label for="refDescription">الوصف:</label>
                        <input type="text" id="refDescription" placeholder="أدخل الوصف" required>
                    </div>

                    <div class="form-group">
                        <label for="refAMM">AMM:</label>
                        <input type="text" id="refAMM" placeholder="أدخل رقم AMM" required>
                    </div>

                    <div class="form-group">
                        <label for="refPN">P/N:</label>
                        <input type="text" id="refPN" placeholder="أدخل P/N" required>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="cancel-btn" onclick="closeAddModal()">إلغاء</button>
                        <button type="submit" class="save-btn">حفظ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="details.js"></script>
</body>
</html>
